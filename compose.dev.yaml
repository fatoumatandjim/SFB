# GesY — stack locale « tout-en-un » pour tests (DB PostgreSQL, API Spring, front Angular/Nginx, Adminer optionnel).
#
# Prérequis : Docker + Docker Compose v2
# Démarrage (depuis ce dossier sfb/) :
#   docker compose -f compose.dev.yaml up --build
# Autres commandes :
#   - docker compose -f compose.dev.yaml down (stop et remove les containers)
#   - docker compose -f compose.dev.yaml logs -f --tail=200 (logs des containers)
#   - docker compose -f compose.dev.yaml build --no-cache (rebuild les images)
#   - docker compose -f compose.dev.yaml up -d --remove-orphans (démarre les containers)
#   - docker compose -f compose.dev.yaml down -v --remove-orphans (stop et remove les containers et les volumes)
#
# You can combine commands :
#   - Windows PowerShell (5.1, 7+, …) : docker compose -f compose.dev.yaml build --no-cache; docker compose -f compose.dev.yaml up -d --remove-orphans
#   - bash, Git Bash, WSL, macOS/Linux : docker compose -f compose.dev.yaml build --no-cache && docker compose -f compose.dev.yaml up -d --remove-orphans
#
# URLs :
#   - Front (Nginx)     http://localhost:8081
#   - API               http://localhost:${API_PORT:-8082}/api
#   - Adminer (si décommenté) → serveur « db », utilisateur/mot de passe = variables POSTGRES_*
#
# PostgreSQL depuis l’hôte (psql, DBeaver, etc.) : localhost:${POSTGRES_PORT:-5433} (défaut 5433 pour éviter
# le conflit avec un Postgres local sur 5432). Pour forcer 5432 : POSTGRES_PORT=5432 dans un fichier .env
# à côté de ce compose, ou : docker compose -f compose.dev.yaml run … (seulement si 5432 est libre).
#
# Mail (SMTP / IMAP) : définir dans un fichier .env à côté de ce fichier (jamais committer les secrets).
#   Exemples — Hostinger : souvent smtp.hostinger.com, port 465, MAIL_PROTOCOL=smtps.
#   Google Workspace / Gmail : smtp.gmail.com, port 587, MAIL_PROTOCOL=smtp + mot de passe d’application ;
#   il peut être nécessaire d’ajuster spring.mail.properties (STARTTLS) dans application-prod ou des variables SPRING_MAIL_PROPERTIES_* si le fournisseur l’exige.
#
# Compte admin initial (voir GesyApplication) : identifiant adminSFB / mot de passe adminSFB@_123
#
# Le front est compilé avec API_URL (PUBLIC_HOST + API_PORT) — en local : PUBLIC_HOST=localhost et API_PORT cohérent avec le mapping ci-dessous.

name: gesy-dev

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gesy}
      POSTGRES_USER: ${POSTGRES_USER:-gesy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gesy_dev_local}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - dev_gesy_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gesy} -d ${POSTGRES_DB:-gesy}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build:
      context: ./ApiGesy-main
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8082}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-gesy}
      DATABASE_USER: ${POSTGRES_USER:-gesy}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-gesy_dev_local}
      FILE_UPLOAD_DIR: /data/uploads
      # SMTP / IMAP — mappés sur spring.mail.* via application.properties (valeurs vides = inchangé côté Spring)
      MAIL_HOST: ${MAIL_HOST:-mail.sfb-petroleum.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-oumar.sanogo@sfb-petroleum.com}
      MAIL_PASSWORD: "${MAIL_PASSWORD:-oumar@123}"
      MAIL_PROTOCOL: ${MAIL_PROTOCOL:-smtps}
      MAIL_DEBUG: ${MAIL_DEBUG:-false}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-false}
      MAIL_SMTP_STARTTLS_REQUIRED: ${MAIL_SMTP_STARTTLS_REQUIRED:-false}
      MAIL_SMTP_SSL_ENABLE: ${MAIL_SMTP_SSL_ENABLE:-true}
      MAIL_SMTP_SSL_TRUST: ${MAIL_SMTP_SSL_TRUST:-}
      MAIL_SMTPS_AUTH: ${MAIL_SMTPS_AUTH:-true}
      MAIL_SMTPS_SSL_ENABLE: ${MAIL_SMTPS_SSL_ENABLE:-true}
      MAIL_SMTPS_SSL_TRUST: ${MAIL_SMTPS_SSL_TRUST:-}
      MAIL_IMAP_HOST: ${MAIL_IMAP_HOST:-mail.sfb-petroleum.com}
      MAIL_IMAP_PORT: ${MAIL_IMAP_PORT:-993}
    volumes:
      - dev_gesy_uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./gesyApp-main
      dockerfile: Dockerfile
      args:
        # URL API telle que le navigateur l’atteint (hôte public + port mappé de l’API)
        # For local use : PUBLIC_HOST=localhost, API_URL: http://localhost:${API_PORT:-8082}/api
        API_URL: http://${PUBLIC_HOST:-76.13.57.94}:${API_PORT:-8082}/api
    ports:
      - "${WEB_PORT:-8081}:80"
    depends_on:
      - api

  # adminer:
  #   image: adminer:latest
  #   ports:
  #     - "${ADMINER_PORT:-8082}:8080"
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     ADMINER_DEFAULT_SERVER: db

volumes:
  dev_gesy_pg_data:
  dev_gesy_uploads:
