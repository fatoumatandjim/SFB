spring.datasource.url=jdbc:mysql://localhost:3306/gesy-db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# Mail (dev local : configurer MAIL_* ou utiliser MailHog sur localhost:1025)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=${MAIL_PROTOCOL:smtp}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:${MAIL_HOST:localhost}}
spring.mail.properties.mail.smtps.auth=${MAIL_SMTPS_AUTH:true}
spring.mail.properties.mail.smtps.ssl.enable=${MAIL_SMTPS_SSL_ENABLE:true}
spring.mail.properties.mail.smtps.ssl.trust=${MAIL_SMTPS_SSL_TRUST:${MAIL_HOST:localhost}}
spring.mail.imap.host=${MAIL_IMAP_HOST:localhost}
spring.mail.imap.port=${MAIL_IMAP_PORT:1143}

