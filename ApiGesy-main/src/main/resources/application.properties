spring.application.name=gesy
spring.profiles.active=prod

# Configuration Mail SMTP/IMAP (variables d'environnement obligatoires en prod)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=${MAIL_PROTOCOL:smtps}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:true}
# Jamais laisser vide : une env vide écrase le fallback — utiliser MAIL_HOST ou le nom du serveur mail.
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:${MAIL_HOST:mail.sfb-petroleum.com}}
spring.mail.properties.mail.smtp.ssl.checkserveridentity=${MAIL_SMTP_SSL_CHECK_SERVER_IDENTITY:false}
spring.mail.properties.mail.smtps.auth=${MAIL_SMTPS_AUTH:true}
spring.mail.properties.mail.smtps.ssl.enable=${MAIL_SMTPS_SSL_ENABLE:true}
spring.mail.properties.mail.smtps.ssl.trust=${MAIL_SMTPS_SSL_TRUST:${MAIL_HOST:mail.sfb-petroleum.com}}
spring.mail.properties.mail.smtps.ssl.checkserveridentity=${MAIL_SMTPS_SSL_CHECK_SERVER_IDENTITY:false}
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
spring.mail.imap.host=${MAIL_IMAP_HOST:}
spring.mail.imap.port=${MAIL_IMAP_PORT:993}

# Configuration des fichiers (pièces jointes)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=${FILE_UPLOAD_DIR:uploads/email-attachments}